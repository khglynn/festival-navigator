name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
      - run: node scripts/validate-festivals.mjs
      # Production-only, High-threshold: quiet enough to be believed,
      # loud only when a user-reachable dependency is actually at risk.
      - run: npm audit --omit=dev --audit-level=high
