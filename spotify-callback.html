<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecting Spotify…</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #111827; color: #e5e7eb;
               display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { text-align: center; max-width: 420px; padding: 2rem; }
        .err { color: #f87171; }
    </style>
</head>
<body>
    <div class="card">
        <h2 id="msg">Connecting your Spotify…</h2>
        <p id="detail" class="err"></p>
    </div>
    <script type="module">
        // Failures land IN the app (design state 5): bank the reason, bounce
        // home fast, and the Spotify drill shows it with a retry — never a
        // dead browser page a muddy-fielded human has to interpret.
        import { completeAuth } from '/js/spotify.js';
        const q = new URLSearchParams(location.search);
        // Return WITH the drill-reopen flag on failure too (audit 6.1): the
        // banked error is surfaced by the drill, so land the user in it.
        let pkceReturn = '/';
        try { pkceReturn = (JSON.parse(sessionStorage.getItem('fn_spotify_pkce') || 'null') || {}).returnTo || '/'; } catch { /* fine */ }
        const backWithError = (reason) => {
            try { sessionStorage.setItem('fn_spotify_error', reason); } catch { /* private mode */ }
            document.getElementById('msg').textContent = 'That didn’t connect';
            document.getElementById('detail').textContent = 'Heading back to the app…';
            setTimeout(() => location.replace(pkceReturn), 1200);
        };
        if (q.get('error')) {
            backWithError(q.get('error'));
        } else {
            completeAuth(q.get('code'), q.get('state'))
                .then((returnTo) => location.replace(returnTo || '/'))
                .catch((e) => backWithError(e.message || 'token exchange failed'));
        }
    </script>
</body>
</html>
